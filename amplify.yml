version: 1
frontend:
  phases:
    preBuild:
      commands:
        # This ensures the cloud build doesn't fail on the same zod warnings
        - npm install --legacy-peer-deps
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*